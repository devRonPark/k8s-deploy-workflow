services:
  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/app
    ports:
      - "8000:8000"
    labels:
      - traefik.enable=true
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: changethis
