    scenario: conflict
    expected_state: not_applicable
    not_applicable_reason: No locked node package conflict case is meaningful without another conflicting artifact.
  - artifact_type: node_package
    field_id: artifact_contract.node_package.coverage_gap
    scenario: coverage_gap
    expected_state: not_applicable
    not_applicable_reason: Node package metadata is supported directly; coverage gaps are represented by unsupported artifact families.
