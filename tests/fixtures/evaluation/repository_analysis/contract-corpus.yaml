schema_version: repository-analysis-corpus/v1
corpus_version: 2026-07-14.6
change_history:
  - version: 2026-07-14.1
    reason: Lock normal, negative finding, conflict, and coverage-gap contracts.
    affected_cases:
      - node-normal
      - node-secret-absence
      - runtime-port-conflict
      - gradle-coverage-gap
  - version: 2026-07-14.2
    reason: Require the Gradle fixture to produce an explicit component boundary.
    affected_cases:
      - gradle-coverage-gap
  - version: 2026-07-14.3
    reason: Bind fixture contents and cover every officially supported artifact family.
    affected_cases:
      - node-normal
      - node-secret-absence
      - runtime-port-conflict
      - gradle-coverage-gap
      - maven-normal
      - python-normal
      - gradle-kotlin-coverage-gap
      - kubernetes-kustomize-coverage-gap
  - version: 2026-07-14.4
    reason: Harden scorecard metric populations, evidence locators, and secret redaction.
    affected_cases:
      - node-normal
      - node-secret-absence
      - runtime-port-conflict
      - gradle-coverage-gap
      - maven-normal
      - python-normal
      - gradle-kotlin-coverage-gap
      - kubernetes-kustomize-coverage-gap
  - version: 2026-07-14.5
    reason: Validate repository pins and fixture fingerprints before scorecard analysis.
    affected_cases:
      - node-normal
      - node-secret-absence
      - runtime-port-conflict
      - gradle-coverage-gap
      - maven-normal
      - python-normal
      - gradle-kotlin-coverage-gap
      - kubernetes-kustomize-coverage-gap
  - version: 2026-07-14.6
    reason: Require explicit not-applicable rows for unsupported artifact/state matrix cells.
    affected_cases:
      - node-normal
      - node-secret-absence
      - runtime-port-conflict
      - gradle-coverage-gap
      - maven-normal
      - python-normal
      - gradle-kotlin-coverage-gap
      - kubernetes-kustomize-coverage-gap
artifact_contract:
