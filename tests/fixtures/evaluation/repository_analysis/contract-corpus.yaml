cases:
  - case_id: node-normal
    visibility: contract
    revision: fixture-v1
    scenario: normal
    content_sha256: sha256:1cd80a18ca893a9f553e6ca2dbdc9a0f1a22ce8d17d867fe19df7beb4bc7de53
    artifact_types: [dockerfile, node_package]
    fields:
      - field_id: components.root.present
        group: core
        expected_state: resolved
        expected_value: true
        expected_evidence:
          - artifact: package.json
            locator: jsonpath:$.dependencies.express
      - field_id: components.root.effective_runtime_command
        group: core
        expected_state: resolved
        expected_value: '["node", "server.js"]'
        expected_evidence:
          - artifact: Dockerfile
            locator: dockerfile:CMD
      - field_id: components.root.runtime_port
        group: core
        expected_state: resolved
        expected_value: 3000
        expected_evidence:
          - artifact: Dockerfile
            locator: dockerfile:EXPOSE[0]
      - field_id: package_dependencies.root.express
        group: extended
        expected_state: resolved
        expected_value: true
        expected_evidence:
          - artifact: package.json
            locator: jsonpath:$.dependencies.express
  - case_id: node-secret-absence
    visibility: contract
    revision: fixture-v1
    scenario: absence
    content_sha256: sha256:1ca1d9f3ae012962d9eb68b5e05f9c4e87b5beac02416d9aa59f7fb7696331ad
    artifact_types: [dockerfile, node_package]
    fields:
      - field_id: components.root.secret_classification
        group: core
        expected_state: not_applicable
        expected_evidence:
