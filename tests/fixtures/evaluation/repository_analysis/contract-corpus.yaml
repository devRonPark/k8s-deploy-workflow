        expected_state: resolved
        expected_value: 3000
        expected_evidence:
          - artifact: Dockerfile
            locator: dockerfile:EXPOSE[0]
      - field_id: package_dependencies.root.express
        group: extended
        expected_state: resolved
        expected_value: true
        expected_evidence:
          - artifact: package.json
            locator: jsonpath:$.dependencies.express
