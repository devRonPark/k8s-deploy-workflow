schema_version: repository-analysis-corpus/v1
corpus_version: 2026-07-14.3
change_history:
  - version: 2026-07-14.1
    reason: Lock normal, negative finding, conflict, and coverage-gap contracts.
    affected_cases:
      - node-normal
      - node-secret-absence
      - runtime-port-conflict
      - gradle-coverage-gap
  - version: 2026-07-14.2
    reason: Require the Gradle fixture to produce an explicit component boundary.
    affected_cases:
      - gradle-coverage-gap
  - version: 2026-07-14.3
    reason: Bind fixture contents and cover every officially supported artifact family.
    affected_cases:
      - node-normal
      - node-secret-absence
      - runtime-port-conflict
      - gradle-coverage-gap
      - maven-normal
      - python-normal
      - gradle-kotlin-coverage-gap
      - kubernetes-kustomize-coverage-gap
